---
title: 言語処理系の意味解析入門
language: ja
audience: 学部3年生くらいで、プログラミング言語処理系初心者
notes: |-
  プログラミング言語処理系で、AST が与えられたとき、どんな意味解析があるのか紹介してください。
  動機と得られる結果、手法などがわかるといいです。
